<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gym Ideas</title>
    <link rel="icon" href="../images/logo.png" type="image/png" />
</head>

<header>
  <img src="../images/logo.png" alt="Cross Logo" class="logo-header" onclick="window.location.href='../index.html'">
  <nav>

      <button class="button" onclick="window.location.href='../index.html'">Home</button>
      <button class="button" onclick="window.location.href='spottr/spottr.html'">Find a Spottr</button>

    <div class="level-buttons">
        <button>Advanced</button>

    <div id="video-display" class="video-area">

    <div class="video-area">
