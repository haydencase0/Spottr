<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gymhelp.css">
    <script src="gymhelp.js" defer></script>
    <script src="workout.js" defer></script>
    <title>Gym Ideas</title>
</head>
<div class="logo">
    <img src="../images/logo.png" alt="Spottr Logo" class="logo" onclick="window.location.href='/index.html'">
</div>
<nav>
    <div class="nav-buttons">
        <button class="home" onclick="window.location.href='../index.html'">Home</button>
        <button class="wwr" onclick="window.location.href='../message_board/message_board.html'">Find a Spottr</button>
        <button class="ice" onclick="window.location.href='../Gym Ideas/gymhelp.html'">Workouts</button>
        <button class="project" onclick="window.location.href='https://www.youtube.com/watch?v=xMHJGd3wwZk'">Project</button>
    </div>
</nav>
<body>
    <select id="type">
        <option value="">Select Workout</option>
        <option value="strength">Strength</option>
        <option value="hypertrophy">Hypertrophy</option>
        <option value="powerlifting">Powerlifting</option>
        <option value="functional">Functional</option>
        <option value="cardio">Cardio</option>
        <option value="mobility">Mobility</option>
    </select>

    <select id="level">
        <option value="">Select Difficulty</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="expert">Expert</option>
    </select>

    <select id="time">
        <option value="">How Long?</option>
        <option value="15">15 minutes</option>
        <option value="30">30 minutes</option>
        <option value="45">45 minutes</option>
        <option value="60">60 minutes</option>
    </select>

    <select id="equipment">
        <option value="">Available Equipment</option>
        <option value="full">Full Gym</option>
        <option value="dumbbell">Dumbbells</option>
        <option value="bodyweight">Bodyweight</option>
    </select>

    <button id="generate-button" type="submit">Generate</button>

    <div id="results"></div>

    <div id="video-display" class="video-area">
        <p>Select an exercise to see the form video!</p>
    </div>
</body>
</html>
