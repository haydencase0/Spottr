<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Board</title>
    <link rel="stylesheet" href="message_board.css">
    <script src="message_board.js" defer></script>
</head>
<body>
    <div class="logo">
        <img src="../images/logo.png" alt="Spottr Logo" class="logo" onclick="window.location.href='/index.html'">
    </div>
    <nav>
        <div class="nav-buttons">
            <button class="home" onclick="window.location.href='../index.html'">Home</button>
            <button class="wwr" onclick="window.location.href='../message_board/message_board.html'">Find a Spottr</button>
            <button class="ice" onclick="window.location.href='../Gym Ideas/gymhelp.html'">Workouts</button>
            <button class="project" onclick="window.location.href='https://www.youtube.com/watch?v=xMHJGd3wwZk'">Project</button>
        </div>
    </nav>
    <main>
        <div class="message-board-container">
            <div class="message-board">
                <form id="message-form">
                    <input type="text" id="name-input" placeholder="Type your name here..." required>
                    <input type="text" id="message-input" placeholder="Type your message here..." required>
                    <button type="submit">Post</button>
                </form>

                <div id="messages"></div>
            </div>
        </div>
    </main>
    <footer>

    </footer>
</body>
</html>
